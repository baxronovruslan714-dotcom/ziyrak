<!DOCTYPE html><html lang="uz"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="apple-mobile-web-app-capable" content="yes"><title>Ziyrak</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui;background:#050510;color:#e8e8ff;height:100dvh;display:flex;flex-direction:column}header{padding:16px;background:#0d0d20;border-bottom:1px solid #ffffff15;display:flex;justify-content:space-between;align-items:center}.logo{font-size:20px;font-weight:700;background:linear-gradient(90deg,#6c63ff,#ff6584);-webkit-background-clip:text;-webkit-text-fill-color:transparent}#msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}.msg{display:flex;gap:8px}.msg.u{flex-direction:row-reverse}.av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;background:#13132a;border:1px solid #ffffff15}.msg.u .av{background:linear-gradient(135deg,#6c63ff,#ff6584)}.bub{padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.6;max-width:calc(100% - 46px);word-break:break-word}.msg.u .bub{background:linear-gradient(135deg,#2a1f6e,#1a1a4e);border-bottom-right-radius:3px}.msg.a .bub{background:#0f1f2e;border:1px solid #ffffff08;border-bottom-left-radius:3px}#inp-area{padding:12px 16px 24px;background:#050510;border-top:1px solid #ffffff10}.row{display:flex;gap:8px;align-items:center}#inp{flex:1;padding:12px 16px;background:#13132a;border:1px solid #ffffff15;border-radius:22px;color:#e8e8ff;font-size:14px;outline:none}#send{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#6c63ff,#ff6584);border:none;color:#fff;font-size:18px;cursor:pointer}#stat{font-size:11px;color:#43e97b;text-align:center;padding:4px 0;min-height:18px}</style></head><body><header><div class="logo">⚡ Ziyrak</div><span style="font-size:11px;color:#5a5a8a">AI Assistant</span></header><div id="msgs"><div style="text-align:center;padding:40px 20px"><div style="font-size:48px">🤖</div><div style="margin-top:12px;font-size:16px;color:#e8e8ff;font-weight:600">Ziyrak Pro</div><div style="margin-top:6px;font-size:13px;color:#5a5a8a">Salom! Savol bering yoki gapiring 🎤</div></div></div><div id="inp-area"><div id="stat"></div><div class="row"><button onclick="startVoice()" style="width:42px;height:42px;border-radius:50%;background:#13132a;border:1px solid #ffffff15;color:#e8e8ff;font-size:18px;cursor:pointer">🎤</button><input id="inp" placeholder="Yozing..." onkeydown="if(event.key==='Enter')send()"><button id="send" onclick="send()">↑</button></div></div><script>const KEY="AIzaSyDWXqN9eoqhUhor0Ek4SuLTbBy6wTmA898";async function send(){const i=document.getElementById('inp');const t=i.value.trim();if(!t)return;i.value='';addMsg('user',t);document.getElementById('stat').textContent='⏳ Javob tayyorlanmoqda...';try{const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${KEY}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{role:'user',parts:[{text:"Sen Ziyrak — o'zbek AI assistanti. Qisqa va do'stona javob ber.\n\n"+t}]}]})});const d=await r.json();addMsg('ai',d.candidates?.[0]?.content?.parts?.[0]?.text||'Xato');document.getElementById('stat').textContent='';}catch(e){document.getElementById('stat').textContent='❌ Xato';}}function addMsg(r,t){const c=document.getElementById('msgs');const d=document.createElement('div');d.className='msg '+(r==='user'?'u':'a');d.innerHTML=`<div class="av">${r==='user'?'😊':'🤖'}</div><div class="bub">${t.replace(/\n/g,'<br>')}</div>`;c.appendChild(d);c.scrollTop=c.scrollHeight;}function startVoice(){const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){alert('Safari da ishlaydi');return;}const r=new SR();r.lang='uz-UZ';r.onresult=e=>{document.getElementById('inp').value=e.results[0][0].transcript;send();};r.start();document.getElementById('stat').textContent='🎤 Gapiring...';}</script></body></html>
